name: CodeQL

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          languages: c-cpp
          # Zig compiles C through its own bundled clang, which the CodeQL
          # build tracer cannot observe ("no source code seen during build").
          # build-mode: none extracts the C/C++ sources directly instead of
          # tracing a build, which is the supported path for non-traceable
          # build systems.
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
