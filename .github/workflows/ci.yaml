name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'

  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0

# Runner selection defaults to GitHub-hosted labels so repositories created
# from this template can run CI immediately. Set repository or organization
# variables CI_LINUX_RUNNER, CI_MACOS_RUNNER, and CI_WINDOWS_RUNNER to opt into
# Namespace or other self-hosted runners.

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
            artifact_name: myapp-linux
          - os: macOS
            runner: ${{ vars.CI_MACOS_RUNNER || 'macos-latest' }}
            artifact_name: myapp-macos
          - os: Windows
            runner: ${{ vars.CI_WINDOWS_RUNNER || 'windows-latest' }}
            artifact_name: myapp-windows

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install Nix (Linux)
        if: runner.os == 'Linux'
        uses: cachix/install-nix-action@v31

      - name: Get Zig version
        id: zig-version
        run: |
          echo "ZIG_VERSION=$(zig version)" >> "$GITHUB_ENV"
        shell: bash

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            zig-out
          key: ${{ runner.os }}-zig-${{ env.ZIG_VERSION }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-${{ env.ZIG_VERSION }}-
            ${{ runner.os }}-zig-

      - name: Extract binary name
        id: extract_binary_name
        run: |
          # Extract the name field from build.zig.zon, handling both quoted and unquoted formats
          BINARY_NAME=$(awk '/\.name = / {gsub(/.*\.name = /, ""); gsub(/[,.]/, ""); gsub(/"/, ""); print}' build.zig.zon)
          echo "BINARY_NAME=$BINARY_NAME" >> "$GITHUB_ENV"
          echo "binary_name=$BINARY_NAME" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Install dependencies
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libncurses-dev
          elif [ "${{ runner.os }}" = "macOS" ]; then
            brew install ncurses
          fi
        shell: bash

      - name: Build libghostty-vt (Linux)
        if: runner.os == 'Linux'
        run: |
          ghostty_ref="github:ghostty-org/ghostty/2e5ad917eb4e325a3dbb161c3f41208a8cd35e44"
          nix build --accept-flake-config --no-link "$ghostty_ref#libghostty-vt.out"
          ghostty_vt_dev="$(nix build --accept-flake-config --no-link --print-out-paths "$ghostty_ref#libghostty-vt.dev")"
          echo "GHOSTTY_VT_DEV=$ghostty_vt_dev" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$ghostty_vt_dev/share/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
        timeout-minutes: 15
        shell: bash

      - name: Install pdcurses (Windows)
        if: runner.os == 'Windows'
        run: |
          # Install vcpkg
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.bat
          ./vcpkg integrate install

          # Install pdcurses
          ./vcpkg install pdcurses:x64-windows
          # Also set library paths for Windows
          {
            echo "VCPKG_ROOT=$(pwd)"
            echo "LIB=$LIB;$(pwd)/installed/x64-windows/lib"
            echo "INCLUDE=$INCLUDE;$(pwd)/installed/x64-windows/include"
          } >> "$GITHUB_ENV"
          cd ..
        shell: bash

      - name: Run `install` step
        run: zig build install
        timeout-minutes: 10
        shell: bash

      - name: Run `check` step
        run: zig build check
        timeout-minutes: 10
        shell: bash

      - name: Check installed binary exists
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            BINARY_EXT=".exe"
          else
            BINARY_EXT=""
          fi

          # Debug: List contents of zig-out/bin
          echo "Contents of zig-out/bin:"
          ls -la zig-out/bin/ || echo "zig-out/bin directory not found"

          # Check if binary exists
          if [ ! -f "./zig-out/bin/$BINARY_NAME$BINARY_EXT" ]; then
            echo "Error: Binary ./zig-out/bin/$BINARY_NAME$BINARY_EXT not found!"
            exit 1
          fi

          # On Windows, check for DLL dependencies
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "Checking binary dependencies:"
            # Try to run with full path to see actual error
            "./zig-out/bin/$BINARY_NAME$BINARY_EXT" --help 2>&1 || echo "Exit code: $?"

            # Add pdcurses DLL to PATH
            export PATH="$PATH:$VCPKG_ROOT/installed/x64-windows/bin"
            echo "Updated PATH with vcpkg bin directory"
          fi
        shell: bash

      - name: Build with TUI support
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            BINARY_EXT=".exe"
            export PATH="$PATH:$VCPKG_ROOT/installed/x64-windows/bin"
            zig build -Denable-tui=true -Dcurses-prefix="$VCPKG_ROOT/installed/x64-windows"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            BINARY_EXT=""
            zig build -Denable-tui=true -Dcurses-prefix="$(brew --prefix ncurses)"
          else
            BINARY_EXT=""
            zig build -Denable-tui=true
          fi

          "./zig-out/bin/$BINARY_NAME$BINARY_EXT" --json info | grep '"tui":true'

          if [ "${{ runner.os }}" = "Linux" ]; then
            # PTY/TUI coverage is Linux-only in CI for now; macOS and Windows
            # still build the TUI binary and run the JSON smoke check above.
            zig build -Denable-tui=true -Dterminal-backend=ghostty terminal-test
          fi
        timeout-minutes: 15
        shell: bash

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe
        timeout-minutes: 15
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.3.1
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_number }}
          path: |
            zig-out/bin/${{ steps.extract_binary_name.outputs.binary_name }}
            zig-out/bin/${{ steps.extract_binary_name.outputs.binary_name }}.exe
          retention-days: 7

  lint:
    name: Lint and Format
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install static analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck
        shell: bash

      - name: Check formatting
        run: zig fmt --check src/ test/
        shell: bash

      - name: Check text hygiene
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! grep -Iq . "$file"; then
              continue
            fi
            if grep -Hn '[[:blank:]]$' "$file"; then
              status=1
            fi
            if [ -s "$file" ] && [ "$(tail -c 1 "$file")" != "" ]; then
              echo "$file: missing final newline"
              status=1
            fi
          done < <(git ls-files -z ':!:zig-pkg/**')
          exit "$status"
        shell: bash

      - name: Check large files
        run: |
          max_bytes=1048576
          status=0
          while IFS= read -r -d '' file; do
            size="$(wc -c < "$file")"
            if [ "$size" -gt "$max_bytes" ]; then
              echo "$file: $size bytes exceeds $max_bytes byte limit"
              status=1
            fi
          done < <(git ls-files -z ':!:zig-pkg/**')
          exit "$status"
        shell: bash

      - name: Check YAML syntax
        run: |
          git ls-files -z '*.yml' '*.yaml' ':!:zig-pkg/**' \
            | xargs -0 npx --yes yaml-lint@1.7.0
        shell: bash

      - name: Check conventional commit subject
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([[:alnum:]_.\/-]+\))?!?: .+'
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            subject="$PR_TITLE"
            label="pull request title"
          else
            subject="$(git log -1 --pretty=%s)"
            label="commit subject"
          fi

          if ! printf '%s\n' "$subject" | grep -Eq "$pattern"; then
            echo "$label does not follow Conventional Commits: $subject"
            exit 1
          fi
        shell: bash

      - name: Run clang-format check
        run: |
          find src test \( -name "*.c" -o -name "*.h" \) -print0 | xargs -0 clang-format --dry-run --Werror
        shell: bash

      - name: Run clang-tidy analysis
        run: |
          zig build -Doptimize=ReleaseSafe
          cc_include_flags=()
          while IFS= read -r include_dir; do
            [ -n "$include_dir" ] && cc_include_flags+=("-isystem" "$include_dir")
          done < <(
            cc -E -x c - -v </dev/null 2>&1 \
              | awk '
                  /#include <...> search starts here:/ { capture = 1; next }
                  /End of search list./ { capture = 0 }
                  capture {
                    sub(/^[[:space:]]+/, "")
                    sub(/[[:space:]]+\\(framework directory\\)$/, "")
                    print
                  }
                '
          )
          while IFS= read -r -d '' file; do
            clang-tidy --quiet \
              --checks='clang-analyzer-*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling,-clang-analyzer-security.ArrayBound,-clang-analyzer-valist.Uninitialized' \
              "$file" -- \
              -std=c23 \
              -Wall \
              -Wextra \
              -D_DEFAULT_SOURCE \
              -D_XOPEN_SOURCE=700 \
              -D_GNU_SOURCE \
              -DAPP_VERSION=\"0.1.0\" \
              -DAPP_NAME=\"myapp\" \
              -DAPP_GIT_COMMIT=\"unknown\" \
              -DAPP_BUILD_DATE=\"reproducible\" \
              -Isrc \
              "${cc_include_flags[@]}"
          done < <(find src -name "*.c" -print0)
        shell: bash

      - name: Run cppcheck analysis
        run: |
          cppcheck --enable=all --inconclusive --std=c23 --platform=unix64 \
            --suppress=unusedFunction \
            --suppress=staticFunction \
            --suppress=missingIncludeSystem \
            --suppress=normalCheckLevelMaxBranches \
            src/
        shell: bash

  validate-template:
    name: Validate Template
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    # Skip validation for the template repository itself
    if: github.repository != 'sammyjoyce/c23-cli-template'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for template placeholders
        run: |
          # Check for common template placeholders (excluding C23 attributes like [[nodiscard]])
          PLACEHOLDERS_FOUND=$(find . -type f -not -path "./.git/*" -not -path "./zig-cache/*" -not -path "./zig-out/*" -not -path "./.github/workflows/*" \( -name "*.md" -o -name "*.yml" -o -name "*.yaml" -o -name "*.json" -o -name "*.txt" -o -name "*.zig" \) -exec grep -l "{{[^}]*}}\|<REPO_NAME>\|<REPO_OWNER>\|<PROJECT_NAME>" {} \; | wc -l)

          if [ "$PLACEHOLDERS_FOUND" -gt 0 ]; then
            echo "❌ Template placeholders found in the following files:"
            find . -type f -not -path "./.git/*" -not -path "./zig-cache/*" -not -path "./zig-out/*" -not -path "./.github/workflows/*" \( -name "*.md" -o -name "*.yml" -o -name "*.yaml" -o -name "*.json" -o -name "*.txt" -o -name "*.zig" \) -exec grep -l "{{[^}]*}}\|<REPO_NAME>\|<REPO_OWNER>\|<PROJECT_NAME>" {} \;
            echo "Please replace all template placeholders before committing."
            exit 1
          else
            echo "✅ No template placeholders found"
          fi
        shell: bash

      - name: Check for template artifacts
        run: |
          # Check for common template artifacts that should be cleaned up
          TEMPLATE_DIRS=".template"
          TEMPLATE_FILES=".templatesyncignore USING_THIS_TEMPLATE.md"

          ARTIFACTS_FOUND=0

          # Check for template directories
          for dir in $TEMPLATE_DIRS; do
            if [ -d "$dir" ]; then
              echo "❌ Template directory found: $dir"
              ARTIFACTS_FOUND=$((ARTIFACTS_FOUND + 1))
            fi
          done

          # Check for template files
          for file in $TEMPLATE_FILES; do
            find . -type f -name "$file" -not -path "./.git/*" | while read -r f; do
              echo "❌ Template file found: $f"
              ARTIFACTS_FOUND=$((ARTIFACTS_FOUND + 1))
            done
          done

          if [ "$ARTIFACTS_FOUND" -gt 0 ]; then
            echo "Please remove all template artifacts before committing."
            exit 1
          else
            echo "✅ No template artifacts found"
          fi
        shell: bash

  renovate-config:
    name: Validate Renovate Config
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate renovate.json
        uses: suzuki-shunsuke/github-action-renovate-config-validator@v1.0.0

  markdown-lint:
    name: Markdown Lint
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Run markdownlint
        run: npx --yes markdownlint-cli@0.45.0 "**/*.md" --ignore ".template/**" --ignore ".github/**" --ignore "zig-out/**" --ignore ".zig-cache/**" --ignore "zig-pkg/**"
        shell: bash

  coverage:
    name: Test Coverage
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Run tests
        run: zig build test
        shell: bash

      - name: Upload coverage to Codecov
        if: hashFiles('lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  secrets-scan:
    name: Secrets Scan
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: Generate SBOM
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
        shell: bash

      - name: Build project
        run: |
          zig build
        shell: bash

      - name: Generate SBOM
        run: |
          syft . --output spdx-json@2.3 > sbom.spdx.json
        shell: bash

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  release:
    name: Create Release
    needs: [test, lint]
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2.0.4
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
